<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0a2e5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HVAC Maintenance">
<title>HVAC Maintenance — King Faisal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;font-size:14px}
body{background:#f0f2f5;color:#0d1b2a}
.app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto;background:#fff;box-shadow:0 0 30px rgba(0,0,0,.1)}
.hdr{background:#0a2e5c;color:#fff;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-icon{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.hdr-text{flex:1;min-width:0}
.hdr-text h1{font-size:13px;font-weight:600}
.hdr-text p{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.offl{background:rgba(46,194,126,.2);border:.5px solid rgba(46,194,126,.4);color:#4ade80;font-size:10px;padding:2px 7px;border-radius:20px;display:flex;align-items:center;gap:3px;flex-shrink:0}
.offl-dot{width:5px;height:5px;border-radius:50%;background:#4ade80}
.tabs{display:flex;background:#0a2e5c;border-top:.5px solid rgba(255,255,255,.1);flex-shrink:0}
.tab{flex:1;padding:8px 4px 9px;font-size:10px;text-align:center;cursor:pointer;color:rgba(255,255,255,.4);border-bottom:2px solid transparent;transition:all .2s}
.tab-icon{font-size:14px;display:block;margin-bottom:1px}
.tab.active{color:#fff;border-bottom-color:#00b4d8;font-weight:500}
.pages{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.pg{display:none;padding:12px}
.pg.active{display:block}
/* Search */
.search-box{display:flex;align-items:center;background:#f4f7fb;border:.5px solid #e2e8f0;border-radius:9px;padding:8px 11px;margin-bottom:10px;gap:7px}
.search-box input{flex:1;border:none;background:transparent;font-size:13px;color:#0d1b2a;outline:none}
.search-box input::placeholder{color:#8a94a6}
/* Zone */
.zone-hdr{background:#0a2e5c;color:#fff;padding:6px 10px;border-radius:7px;font-size:11px;font-weight:600;margin:9px 0 5px;display:flex;justify-content:space-between;align-items:center}
.zone-cnt{font-size:9px;opacity:.6;font-weight:400}
/* Unit card */
.ucard{border:.5px solid #e2e8f0;border-radius:10px;padding:9px 11px;margin-bottom:6px;cursor:pointer;background:#fff;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.ucard:active{transform:scale(.98);border-color:#0a2e5c;background:#f0f6ff}
.urow{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.uname{font-weight:600;font-size:12px;color:#0a2e5c;font-family:monospace}
.bdg{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:500}
.b-ok{background:#e8f8f0;color:#1a7a4a}
.b-due{background:#fff3e0;color:#a05c00}
.umeta{font-size:10px;color:#8a94a6}
/* Form */
.fhdr{background:linear-gradient(135deg,#0a2e5c,#1a5fae);color:#fff;border-radius:10px;padding:11px 13px;margin-bottom:10px}
.fhdr h2{font-size:13px;font-weight:600;font-family:monospace;margin-bottom:2px}
.fhdr p{font-size:10px;opacity:.7}
.stitle{font-size:10px;font-weight:600;color:#8a94a6;text-transform:uppercase;letter-spacing:.07em;margin:11px 0 5px}
.finrow{display:flex;gap:6px;margin-bottom:8px}
.fin{flex:1;border:.5px solid #e2e8f0;border-radius:7px;padding:8px 10px;font-size:13px;background:#fff;color:#0d1b2a;font-family:system-ui,sans-serif}
.fin:focus{outline:none;border-color:#0a2e5c}
.lvltabs{display:flex;gap:4px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.lvltabs::-webkit-scrollbar{display:none}
.lt{padding:4px 10px;border-radius:20px;border:.5px solid #e2e8f0;font-size:10px;cursor:pointer;background:#fff;color:#4a5568;white-space:nowrap;transition:all .15s;flex-shrink:0}
.lt.active{background:#0a2e5c;color:#fff;border-color:#0a2e5c}
.pbar-row{display:flex;justify-content:space-between;font-size:10px;color:#8a94a6;margin-bottom:4px}
.pbar-row span{color:#0a2e5c;font-weight:600}
.pbar{height:4px;background:#e2e8f0;border-radius:2px;margin-bottom:9px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#0a2e5c,#00b4d8);border-radius:2px;transition:width .3s}
.clwrap{background:#fff;border:.5px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:4px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.ci{padding:9px 11px;border-bottom:.5px solid #e2e8f0;display:flex;align-items:flex-start;gap:8px}
.ci:last-child{border-bottom:none}
.ciinfo{flex:1;min-width:0}
.cilbl{font-size:12px;font-weight:600;margin-bottom:1px;color:#0d1b2a}
.cisub{font-size:10px;color:#8a94a6;font-family:monospace}
.tg{display:flex;gap:3px;flex-shrink:0}
.tb{padding:4px 9px;border-radius:20px;border:.5px solid #e2e8f0;font-size:10px;cursor:pointer;background:#fff;color:#4a5568;transition:all .15s;white-space:nowrap}
.tb:active{transform:scale(.95)}
.tb.ty{background:#e8f8f0;border-color:#a3d9be;color:#1a7a4a;font-weight:600}
.tb.tn{background:#fef0f0;border-color:#f5bfc0;color:#c0392b;font-weight:600}
.numin{width:68px;border:.5px solid #e2e8f0;border-radius:6px;padding:4px 7px;font-size:12px;text-align:center;background:#fff;color:#0d1b2a;font-family:monospace}
.numin:focus{outline:none;border-color:#0a2e5c}
.ulbl{font-size:9px;color:#8a94a6;font-family:monospace;margin-right:2px}
.nota{width:100%;border:.5px solid #e2e8f0;border-radius:7px;padding:8px 10px;font-size:12px;min-height:60px;resize:vertical;font-family:system-ui,sans-serif;background:#fff;color:#0d1b2a}
.nota:focus{outline:none;border-color:#0a2e5c}
.sbtn{width:100%;background:#0a2e5c;color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:11px}
.sbtn:active{opacity:.85}
/* Success */
.succ{text-align:center;padding:24px 12px}
.si{font-size:46px;margin-bottom:9px}
.st{font-size:16px;font-weight:600;margin-bottom:4px;color:#0a2e5c}
.ss{font-size:11px;color:#4a5568;margin-bottom:14px;line-height:1.7;font-family:monospace}
.sstats{display:flex;justify-content:center;gap:20px;margin-bottom:16px}
.sstat{text-align:center}
.snum{font-size:22px;font-weight:700}
.slbl{font-size:10px;color:#8a94a6;margin-top:1px}
.abtns{display:flex;flex-direction:column;gap:6px}
.ab{padding:10px;border-radius:9px;font-size:13px;cursor:pointer;font-weight:500;border:.5px solid #e2e8f0;background:#fff;color:#0d1b2a;width:100%;font-family:system-ui,sans-serif;text-align:center}
.ab:active{transform:scale(.98)}
.ab.navy{background:#0a2e5c;color:#fff;border-color:#0a2e5c}
.ab.grn{background:#e8f8f0;color:#1a7a4a;border-color:#a3d9be}
/* Records */
.ri{background:#fff;border:.5px solid #e2e8f0;border-radius:9px;padding:9px 11px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.rrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.rname{font-weight:600;font-size:11px;color:#0a2e5c;font-family:monospace}
.rdate{font-size:10px;color:#8a94a6;font-family:monospace}
.rtech{font-size:10px;color:#4a5568;margin-bottom:5px}
.rpills{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.rp{font-size:9px;padding:2px 6px;border-radius:10px;font-family:monospace}
.rbtn{font-size:9px;padding:2px 8px;border-radius:10px;border:.5px solid #e2e8f0;cursor:pointer;background:#fff;color:#4a5568;margin-right:auto}
.empty{text-align:center;padding:36px 16px;color:#8a94a6}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.5}
/* Info */
.info{background:#EBF4FF;border:.5px solid #B5D4F4;border-radius:8px;padding:8px 11px;font-size:11px;color:#0a2e5c;margin-bottom:10px;line-height:1.7}
/* QR */
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:7px}
.qcard{background:#fff;border:.5px solid #e2e8f0;border-radius:9px;padding:10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.qname{font-size:10px;font-weight:700;margin-bottom:6px;color:#0a2e5c;font-family:monospace;line-height:1.3;word-break:break-all}
.qid{font-size:9px;color:#8a94a6;margin-top:4px;font-family:monospace}
/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:999;padding:0}
.mbox{background:#fff;border-radius:16px 16px 0 0;padding:16px 14px 26px;width:100%;max-width:520px;margin:0 auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mbox h3{font-size:14px;font-weight:600;margin-bottom:9px;color:#0a2e5c}
.mmsg{background:#f4f7fb;border:.5px solid #e2e8f0;border-radius:8px;padding:10px;font-size:11px;line-height:1.8;margin-bottom:11px;white-space:pre-wrap;max-height:250px;overflow-y:auto;font-family:monospace;color:#0d1b2a}
.mbtns{display:flex;gap:7px}
.mb{flex:1;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;border:.5px solid #e2e8f0;background:#fff;color:#0d1b2a;font-family:system-ui,sans-serif;font-weight:500}
.mb.navy{background:#0a2e5c;color:#fff;border-color:#0a2e5c}
/* QR zone tabs */
.ztabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-bottom:8px}
.ztabs::-webkit-scrollbar{display:none}
.zt{padding:4px 10px;border-radius:20px;border:.5px solid #e2e8f0;font-size:10px;cursor:pointer;background:#fff;color:#4a5568;white-space:nowrap;flex-shrink:0;transition:all .15s}
.zt.active{background:#0a2e5c;color:#fff;border-color:#0a2e5c}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-icon">❄️</div>
    <div class="hdr-text">
      <h1>HVAC Preventive Maintenance</h1>
      <p id="hdrsub">AL MAJAL — King Faisal Medical Complex</p>
    </div>
    <div class="offl"><div class="offl-dot"></div>Offline</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="go('units')"><span class="tab-icon">🏢</span>الوحدات</div>
    <div class="tab" onclick="go('form')"><span class="tab-icon">📋</span>النموذج</div>
    <div class="tab" onclick="go('records')"><span class="tab-icon">📁</span>السجلات</div>
    <div class="tab" onclick="go('qr')"><span class="tab-icon">⬛</span>QR Codes</div>
  </div>
  <div class="pages">

    <!-- UNITS -->
    <div class="pg active" id="pg-units">
      <div class="search-box">
        <span style="font-size:14px;color:#8a94a6">🔍</span>
        <input id="search-input" placeholder="ابحث عن وحدة..." oninput="filterUnits(this.value)">
      </div>
      <div id="units-list"></div>
    </div>

    <!-- FORM -->
    <div class="pg" id="pg-form">
      <div id="form-wrap">
        <div class="empty"><div class="empty-icon">👈</div><div>اختر وحدة من تبويب الوحدات</div></div>
      </div>
    </div>

    <!-- RECORDS -->
    <div class="pg" id="pg-records">
      <div class="info">💡 السجلات محفوظة على الجهاز — تعمل بدون إنترنت</div>
      <div id="rec-list"></div>
    </div>

    <!-- QR -->
    <div class="pg" id="pg-qr">
      <div class="info">📲 امسح QR الوحدة لفتح نموذجها مباشرة</div>
      <div style="background:#fff;border:.5px solid #e2e8f0;border-radius:9px;padding:9px 11px;margin-bottom:10px">
        <div style="font-size:10px;font-weight:600;color:#8a94a6;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">🔗 رابط الموقع</div>
        <div style="display:flex;gap:5px">
          <input id="url-input" style="flex:1;border:.5px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:10px;font-family:monospace;background:#fff;color:#0d1b2a" placeholder="https://username.github.io/repo">
          <button onclick="updateURL()" style="background:#0a2e5c;color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:10px;cursor:pointer;white-space:nowrap">تحديث</button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <div style="font-size:10px;font-weight:600;color:#8a94a6;text-transform:uppercase;letter-spacing:.05em">المنطقة</div>
        <button onclick="printAllQR()" style="background:#0a2e5c;color:#fff;border:none;border-radius:7px;padding:6px 10px;font-size:10px;cursor:pointer">🖨️ طباعة الكل</button>
      </div>
      <div class="ztabs" id="qr-zone-tabs"></div>
      <div class="qgrid" id="qr-grid"></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="mbox">
    <h3>📨 تقرير للمشرف</h3>
    <div class="mmsg" id="modal-msg"></div>
    <div class="mbtns">
      <button class="mb" onclick="closeModal()">إغلاق</button>
      <button class="mb navy" onclick="copyReport()">📋 نسخ التقرير</button>
    </div>
  </div>
</div>

<script>
window.onerror=function(msg,src,line,col,err){
  document.getElementById('units-list').innerHTML='<div style="padding:20px;color:red;font-size:12px">Error: '+msg+' (line '+line+')</div>';
  console.error('JS Error:',msg,src,line,col,err);
  return false;
};
//---
// QR CODE ENGINE — Pure JS, ISO 18004 compliant
//---
var QR=(function(){
  var EXP=new Array(512),LOG=new Array(256);
  (function(){var x=1;for(var i=0;i<256;i++){EXP[i]=x;LOG[x]=i;x=(x+x);if(x>255)x^=0x11d;}for(var i=0;i<256;i++)EXP[i+255]=EXP[i];})();
  function mul(a,b){return(a&&b)?EXP[LOG[a]+LOG[b]]:0;}
  function rsGen(n){var g=[1];for(var i=0;i<n;i++){var r=new Array(g.length+1).fill(0);for(var j=0;j<g.length;j++){r[j]^=mul(g[j],1);r[j+1]^=mul(g[j],EXP[i]);}g=r;}return g;}
  function rsEncode(data,nsym){var gen=rsGen(nsym);var msg=data.concat(new Array(nsym).fill(0));for(var i=0;i<data.length;i++){var c=msg[i];if(c)for(var j=0;j<gen.length;j++)msg[i+j]^=mul(gen[j],c);}return msg.slice(data.length);}
  var CAP={1:[16,10,1],2:[28,16,1],3:[44,26,1],4:[64,18,2],5:[86,24,2],6:[108,16,4],7:[124,18,4],8:[154,22,4],9:[182,22,5],10:[216,26,5]};
  var AP={2:[6,18],3:[6,22],4:[6,26],5:[6,30],6:[6,34],7:[6,22,38],8:[6,24,42],9:[6,26,46],10:[6,28,50]};
  function newM(n){var m=[];for(var i=0;i<n;i++){m[i]=new Int8Array(n);for(var j=0;j<n;j++)m[i][j]=-1;}return m;}
  function finder(m,r,c){var n=m.length;for(var i=-1;i<=7;i++)for(var j=-1;j<=7;j++){var rr=r+i,cc=c+j;if(rr<0||rr>=n||cc<0||cc>=n)continue;m[rr][cc]=((i>=0&&i<=6&&(j===0||j===6))||(j>=0&&j<=6&&(i===0||i===6))||(i>=2&&i<=4&&j>=2&&j<=4))?1:0;}}
  function align(m,r,c){for(var i=-2;i<=2;i++)for(var j=-2;j<=2;j++)if(m[r+i][c+j]<0)m[r+i][c+j]=(Math.abs(i)===2||Math.abs(j)===2||(i===0&&j===0))?1:0;}
  function buildBase(v){var n=4*v+17,m=newM(n);finder(m,0,0);finder(m,0,n-7);finder(m,n-7,0);for(var i=8;i<n-8;i++){if(m[6][i]<0)m[6][i]=i%2?0:1;if(m[i][6]<0)m[i][6]=i%2?0:1;}m[4*v+9][8]=1;for(var i=0;i<9;i++)if(m[i][8]<0)m[i][8]=0;for(var i=0;i<8;i++)if(m[8][i]<0)m[8][i]=0;for(var i=n-8;i<n;i++){if(m[i][8]<0)m[i][8]=0;if(m[8][i]<0)m[8][i]=0;}var ap=AP[v]||[];for(var a=0;a<ap.length;a++)for(var b=0;b<ap.length;b++)if(m[ap[a]][ap[b]]<0)align(m,ap[a],ap[b]);return m;}
  function placeData(m,bits){var n=m.length,idx=0,up=true;for(var col=n-1;col>=1;col-=2){if(col===6)col=5;for(var i=0;i<n;i++){var r=up?n-1-i:i;for(var d=0;d<2;d++){var c=col-d;if(m[r][c]>=0)continue;m[r][c]=idx<bits.length?bits[idx++]:0;}}up=!up;}}
  function applyMask(m,k){var n=m.length,r=newM(n);for(var i=0;i<n;i++)for(var j=0;j<n;j++){var inv=k===0?(i+j)%2===0:k===1?i%2===0:k===2?j%3===0:k===3?(i+j)%3===0:k===4?(Math.floor(i/2)+Math.floor(j/3))%2===0:k===5?(i*j)%2+(i*j)%3===0:k===6?((i*j)%2+(i*j)%3)%2===0:((i+j)%2+(i*j)%3)%2===0;r[i][j]=m[i][j]^(inv?1:0);}return r;}
  function writeFmt(m,mk){var fmt=(0)|mk,g=0x537,v=fmt*1024;for(var i=14;i>=10;i--)if(v&(Math.pow(2,i)|0))v^=g*Math.pow(2,i-10)|0;var enc=((fmt*1024)|(v&0x3FF))^0x5412;var n=m.length;var pos=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];for(var i=0;i<15;i++){var b=(enc>>(14-i))&1;m[pos[i][0]][pos[i][1]]=b;if(i<8)m[n-1-i][8]=b;else m[8][n-15+i]=b;}m[n-8][8]=1;}
  function score(m){var n=m.length,s=0;for(var i=0;i<n;i++){var run=1;for(var j=1;j<n;j++){if(m[i][j]===m[i][j-1]){run++;if(run===5)s+=3;else if(run>5)s++;}else run=1;}}return s;}
  function encode(text){
    var bytes=[];for(var i=0;i<text.length;i++)bytes.push(text.charCodeAt(i)&0xFF);
    var ver=1;for(var v=1;v<=10;v++){if(CAP[v]&&CAP[v][0]>=bytes.length+3){ver=v;break;}}
    var cap=CAP[ver];
    var bits=[0,1,0,0];for(var i=7;i>=0;i--)bits.push((bytes.length>>i)&1);
    bytes.forEach(function(b){for(var i=7;i>=0;i--)bits.push((b>>i)&1);});
    for(var i=0;i<4&&bits.length<cap[0]*8;i++)bits.push(0);
    while(bits.length%8)bits.push(0);
    var pad=[0xEC,0x11],pi=0;
    while(bits.length<cap[0]*8){var pw=pad[pi++%2];for(var i=7;i>=0;i--)bits.push((pw>>i)&1);}
    var db=[];for(var i=0;i<bits.length;i+=8){var b=0;for(var j=0;j<8;j++)b=(b*2)|(bits[i+j]||0);db.push(b);}
    var bs=Math.floor(db.length/cap[2]),ad=[],ae=[];
    for(var i=0;i<cap[2];i++){var bl=db.slice(i*bs,(i+1)*bs);ad.push(bl);ae.push(rsEncode(bl,cap[1]));}
    var cw=[];var mx=Math.max.apply(null,ad.map(function(b){return b.length;}));
    for(var i=0;i<mx;i++)ad.forEach(function(b){if(i<b.length)cw.push(b[i]);});
    for(var i=0;i<cap[1];i++)ae.forEach(function(b){if(i<b.length)cw.push(b[i]);});
    var cbits=[];cw.forEach(function(b){for(var i=7;i>=0;i--)cbits.push((b>>i)&1);});
    var base=buildBase(ver);placeData(base,cbits);
    var best=null,bestS=Infinity;
    for(var k=0;k<8;k++){var mk=applyMask(base,k);writeFmt(mk,k);var s=score(mk);if(s<bestS){bestS=s;best=mk;}}
    return{M:best,n:4*ver+17};
  }
  function toSVG(qr,size,dark,light){
    var n=qr.n,cell=size/n,rects='';
    for(var r=0;r<n;r++)for(var c=0;c<n;c++)
      if(qr.M[r][c]===1)rects+='<rect x="'+(c*cell).toFixed(2)+'" y="'+(r*cell).toFixed(2)+'" width="'+(cell+0.3).toFixed(2)+'" height="'+(cell+0.3).toFixed(2)+'"/>';
    return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" shape-rendering="crispEdges"><rect width="'+size+'" height="'+size+'" fill="'+(light||'#fff')+'"/><g fill="'+(dark||'#000')+'">'+rects+'</g></svg>';
  }
  return{encode:encode,toSVG:toSVG};
})();

function renderUnits(filter){

      var u=ALL_UNITS[uid];

    '<div class="mb"><div class="ml">الفني</div><div class="mv">'+rec.tech+'</div></div></div>'+
    '<div class="stats">'+
    '<div class="sb" style="background:#e8f8f0"><div style="font-size:22px;font-weight:700;color:#1a7a4a">'+rec.doneT+'</div><div style="font-size:10px;color:#1a7a4a;margin-top:2px">مكتمل</div></div>'+
    '<div class="sb" style="background:#fef0f0"><div style="font-size:22px;font-weight:700;color:#c0392b">'+rec.notDoneT+'</div><div style="font-size:10px;color:#c0392b;margin-top:2px">يحتاج متابعة</div></div></div>'+
    '<table><tr><th>بند الصيانة</th><th>الوصف</th><th>النتيجة</th></tr>'+rows+'</table>'+
    (rec.data&&rec.data.notes?'<div style="background:#fff3e0;border-radius:7px;padding:10px;font-size:12px;line-height:1.7;margin-bottom:10px"><b>📝 ملاحظات:</b><br><br>'+rec.data.notes+'</div>':'')+
    '<div class="ft">HVAC Maintenance System — King Faisal Medical Complex — '+new Date().toLocaleDateString('ar-SA')+'</div>'+
    '</body></html>');
  w.document.close();setTimeout(function(){w.print();},400);
}

//---
// QR CODES
//---
function updateURL(){
  var inp=document.getElementById('url-input');
  if(inp&&inp.value.trim()){
    SITE_URL=inp.value.trim().replace(/\/+$/,'');
    renderQR();
    alert('✅ تم تحديث الـ QR بالرابط الجديد');
  }
}
function renderQRZoneTabs(){
  document.getElementById('qr-zone-tabs').innerHTML=ZONES.map(function(z){
    return '<button class="zt '+(qrZone===z.id?'active':'')+'" onclick="qrZone=\''+z.id+'\';renderQRZoneTabs();renderQR()">'+z.name+'</button>';
  }).join('');
}
function renderQR(){
  var inp=document.getElementById('url-input');
  if(inp&&!inp.value)inp.value=SITE_URL;
  var zone=ZONES.find(function(z){return z.id===qrZone;});
  var html=zone.units.map(function(uid){
    var u=ALL_UNITS[uid];
    var url=SITE_URL+'?unit='+encodeURIComponent(uid);
    var svgHtml='';
    try{var qr=QR.encode(url);svgHtml=QR.toSVG(qr,110,'#0a2e5c','#ffffff');}
    catch(e){svgHtml='<div style="width:110px;height:110px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:9px;color:#999;margin:0 auto;border-radius:4px">QR Error</div>';}
    return '<div class="qcard"><div class="qname">'+u.name+'</div>'+svgHtml+'<div class="qid">'+zone.name+'</div></div>';
  }).join('');
  document.getElementById('qr-grid').innerHTML=html;
}
function printAllQR(){
  var w=window.open('','_blank');
  if(!w){alert('فعّل النوافذ المنبثقة');return;}
  var cards='';
  ZONES.forEach(function(z){
    cards+='<div class="zt">'+z.name+' ('+z.en+')</div><div class="zg">';
    z.units.forEach(function(uid){
      var u=ALL_UNITS[uid];
      var url=SITE_URL+'?unit='+encodeURIComponent(uid);
      var svgH='';
      try{var qr=QR.encode(url);svgH=QR.toSVG(qr,160,'#000','#fff');}catch(e){svgH='<div style="width:160px;height:160px;background:#eee;display:inline-block"></div>';}
      cards+='<div class="qi">'+svgH+'<div class="un">'+u.name+'</div><div class="uz">'+z.name+'</div></div>';
    });
    cards+='</div>';
  });
  w.document.write('<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>QR Codes — HVAC</title>'+
    '<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui;padding:14px;direction:rtl}'+
    '.title{text-align:center;margin-bottom:12px;color:#0a2e5c;font-size:14px;font-weight:700;padding:10px;background:#EBF4FF;border-radius:7px}'+
    '.zt{font-size:11px;font-weight:700;color:#0a2e5c;margin:11px 0 6px;padding:5px 8px;background:#f0f6ff;border-radius:5px}'+
    '.zg{display:flex;flex-wrap:wrap;gap:9px}'+
    '.qi{border:1px solid #ddd;border-radius:9px;padding:10px;text-align:center;background:#fff;width:182px;page-break-inside:avoid}'+
    '.qi svg{display:block;margin:0 auto}.un{font-size:11px;font-weight:700;color:#0a2e5c;margin-top:6px;font-family:monospace}.uz{font-size:9px;color:#888;margin-top:2px}'+
    '.pb{display:block;margin:0 auto 12px;background:#0a2e5c;color:#fff;border:none;padding:8px 24px;border-radius:7px;font-size:13px;cursor:pointer}'+
    '@media print{.pb{display:none}}</style></head><body>'+
    '<div class="title">❄️ HVAC QR Codes — King Faisal Medical Complex (85 وحدة)</div>'+
    '<button class="pb" onclick="window.print()">🖨️ طباعة الكل</button>'+
    cards+'</body></html>');
  w.document.close();
}

//---
// NAVIGATION
//---
function go(tab){
  var tabs=['units','form','records','qr'];
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',tabs[i]===tab);});
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('active');});
  document.getElementById('pg-'+tab).classList.add('active');
  if(tab==='records')renderRecs();
  if(tab==='qr'){renderQRZoneTabs();renderQR();}
  if(tab==='form'&&selUnit)buildForm();
}

//---
// INIT
//---
function init(){
  try{
    renderUnits();
    renderRecs();
    var p=new URLSearchParams(window.location.search);
    var uid=p.get('unit');
    if(uid&&ALL_UNITS[uid])setTimeout(function(){pickUnit(uid);},400);
  }catch(e){
    document.getElementById('units-list').innerHTML='<div style="padding:20px;color:red;font-size:12px">Init Error: '+e.message+'</div>';
    console.error('Init error:',e);
  }
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
</script>
