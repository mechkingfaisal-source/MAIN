<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC Maintenance System</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 15px;
}

h2 {
  text-align: center;
}

form {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

label {
  margin-top: 10px;
  display: block;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  background: #007bff;
  color: white;
  border: none;
  font-size: 16px;
}

#preview {
  margin-top: 10px;
  width: 100%;
}
</style>

</head>

<body>

<h2>AHU Maintenance</h2>

<form id="form">

<label>Unit ID</label>
<input type="text" id="unit" readonly>

<label>Technician</label>
<input type="text" id="tech" required>

<label>Date</label>
<input type="datetime-local" id="date">

<label>Maintenance Type</label>
<select id="type">
  <option>Preventive</option>
  <option>Corrective</option>
  <option>Emergency</option>
</select>

<label>Status</label>
<select id="status">
  <option>Completed</option>
  <option>Pending</option>
</select>

<label>Notes</label>
<textarea id="notes"></textarea>

<label>Take Photo</label>
<input type="file" id="photo" accept="image/*" capture="environment" required>

<img id="preview"/>

<button type="submit">Submit</button>

</form>

<script>

// ✅ قراءة QR (unit)
const params = new URLSearchParams(window.location.search);
document.getElementById("unit").value = params.get("unit") || "UNKNOWN";

// ✅ تاريخ تلقائي
document.getElementById("date").value = new Date().toISOString().slice(0,16);

// ✅ عرض الصورة قبل الإرسال
document.getElementById("photo").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    document.getElementById("preview").src = URL.createObjectURL(file);
  }
});

// ✅ إرسال البيانات
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  let file = document.getElementById("photo").files[0];

  let reader = new FileReader();

  reader.onloadend = async function() {

    let data = {
      unit: document.getElementById("unit").value,
      tech: document.getElementById("tech").value,
      date: document.getElementById("date").value,
      type: document.getElementById("type").value,
      status: document.getElementById("status").value,
      notes: document.getElementById("notes").value,
      image: reader.result
    };

    try {
      await fetch("PUT_YOUR_GOOGLE_SCRIPT_URL_HERE", {
        method: "POST",
        body: JSON.stringify(data)
      });

      alert("✅ Saved Successfully");

      document.getElementById("form").reset();

    } catch (err) {
      alert("❌ Error sending data");
    }

  };

  reader.readAsDataURL(file);
});

</script>

</body>
</html>
